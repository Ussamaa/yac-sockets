<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Data Service - Interactive Test Client</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status.connected {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 2px solid #28a745;
        }
        .status.disconnected {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 2px solid #dc3545;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin: 15px 0;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            flex: 1;
            min-width: 300px;
            font-size: 14px;
            transition: border 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .quote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .quote-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .quote-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        .quote-card.positive { border-left-color: #28a745; }
        .quote-card.negative { border-left-color: #dc3545; }
        .quote-symbol {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .quote-price {
            font-size: 32px;
            color: #667eea;
            font-weight: bold;
            margin: 15px 0;
        }
        .quote-change {
            font-size: 16px;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
        }
        .quote-change.positive {
            background: #d4edda;
            color: #28a745;
        }
        .quote-change.negative {
            background: #f8d7da;
            color: #dc3545;
        }
        .quote-meta {
            font-size: 13px;
            color: #666;
            margin-top: 15px;
            line-height: 1.6;
        }
        #log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            height: 350px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .log-line { margin: 4px 0; }
        .log-time { color: #858585; }
        .log-info { color: #4ec9b0; }
        .log-error { color: #f48771; }
        .log-success { color: #b5cea8; }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge.live {
            background: #28a745;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 FastAPI Market Data Service</h1>
        
        <div class="panel">
            <h2>WebSocket Connection</h2>
            <div id="ws-status" class="status disconnected">
                ● Disconnected
            </div>
            <div class="controls">
                <button onclick="connectWebSocket()">🔌 Connect</button>
                <button onclick="disconnectWebSocket()">⏸️ Disconnect</button>
            </div>
        </div>

        <div class="panel">
            <h2>Subscribe to Market Data <span class="badge live pulse">LIVE</span></h2>
            <div class="controls">
                <input type="text" id="symbols-input" 
                       placeholder="Enter symbols separated by commas (e.g., AAPL,GOOGL,BTC/USD)" 
                       value="AAPL,GOOGL,MSFT,TSLA">
                <button onclick="subscribeToMarket()">📡 Subscribe</button>
                <button onclick="unsubscribeFromMarket()">🚫 Unsubscribe</button>
            </div>
        </div>

        <div class="panel">
            <h2>REST API - Get Quotes</h2>
            <div class="controls">
                <input type="text" id="rest-symbols-input" 
                       placeholder="Enter symbols for one-time fetch" 
                       value="AAPL,GOOGL,BTC/USD,ETH/USD">
                <button onclick="fetchQuotes()">📥 Get Quotes</button>
            </div>
        </div>

        <div class="panel">
            <h2>Live Quotes Dashboard</h2>
            <div id="quotes" class="quote-grid">
                <p style="color: #888; padding: 40px; text-align: center;">
                    No quotes yet. Connect and subscribe to symbols above to see live market data.
                </p>
            </div>
        </div>

        <div class="panel">
            <h2>Activity Log</h2>
            <div class="controls">
                <button onclick="clearLog()">🗑️ Clear Log</button>
            </div>
            <div id="log"></div>
        </div>
    </div>

    <script>
        let socket = null;
        let quotes = {};
        const SERVER_URL = 'http://localhost:8001';

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : 'log-info';
            logDiv.innerHTML += `<div class="log-line"><span class="log-time">[${time}]</span> <span class="${className}">${message}</span></div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('Log cleared', 'info');
        }

        function updateStatus(connected) {
            const statusDiv = document.getElementById('ws-status');
            if (connected) {
                statusDiv.className = 'status connected';
                statusDiv.innerHTML = '● Connected to ' + SERVER_URL;
            } else {
                statusDiv.className = 'status disconnected';
                statusDiv.innerHTML = '● Disconnected';
            }
        }

        function connectWebSocket() {
            if (socket && socket.connected) {
                log('⚠️ Already connected', 'info');
                return;
            }

            log('🔌 Connecting to WebSocket...', 'info');
            socket = io(SERVER_URL);

            socket.on('connect', () => {
                log('✅ WebSocket connected successfully!', 'success');
                updateStatus(true);
            });

            socket.on('disconnect', () => {
                log('❌ WebSocket disconnected', 'error');
                updateStatus(false);
            });

            socket.on('quote_update', (data) => {
                log(`📊 ${data.symbol}: $${data.mid_price?.toFixed(2)} (real-time update)`, 'success');
                quotes[data.symbol] = data;
                renderQuotes();
            });

            socket.on('subscribed', (data) => {
                log(`✅ Subscribed to: ${data.symbols.join(', ')}`, 'success');
            });

            socket.on('unsubscribed', (data) => {
                log(`🚫 Unsubscribed from: ${data.symbols.join(', ')}`, 'info');
            });

            socket.on('error', (error) => {
                log(`❌ Socket error: ${error}`, 'error');
            });
        }

        function disconnectWebSocket() {
            if (socket) {
                socket.disconnect();
                socket = null;
                log('⏸️ Disconnected from WebSocket', 'info');
                updateStatus(false);
            }
        }

        function subscribeToMarket() {
            if (!socket || !socket.connected) {
                log('❌ Not connected. Please connect first.', 'error');
                return;
            }

            const input = document.getElementById('symbols-input').value;
            const symbols = input.split(',').map(s => s.trim().toUpperCase()).filter(s => s);
            
            if (symbols.length === 0) {
                log('❌ Please enter at least one symbol', 'error');
                return;
            }

            log(`📡 Subscribing to: ${symbols.join(', ')}...`, 'info');
            socket.emit('join_market', { symbols });
        }

        function unsubscribeFromMarket() {
            if (!socket || !socket.connected) {
                log('❌ Not connected', 'error');
                return;
            }

            const input = document.getElementById('symbols-input').value;
            const symbols = input.split(',').map(s => s.trim().toUpperCase()).filter(s => s);
            
            if (symbols.length === 0) {
                log('❌ Please enter symbols to unsubscribe', 'error');
                return;
            }

            log(`🚫 Unsubscribing from: ${symbols.join(', ')}...`, 'info');
            socket.emit('leave_market', { symbols });
            
            symbols.forEach(symbol => delete quotes[symbol]);
            renderQuotes();
        }

        async function fetchQuotes() {
            const input = document.getElementById('rest-symbols-input').value;
            const symbols = input.split(',').map(s => s.trim().toUpperCase()).filter(s => s);
            
            if (symbols.length === 0) {
                log('❌ Please enter symbols', 'error');
                return;
            }

            log(`📥 Fetching quotes for: ${symbols.join(', ')}...`, 'info');

            try {
                const response = await fetch(`${SERVER_URL}/api/quotes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbols })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                log(`✅ Received ${data.count} quotes via REST API`, 'success');
                
                data.quotes.forEach(quote => {
                    if (quote.error) {
                        log(`⚠️ ${quote.symbol}: ${quote.error}`, 'error');
                    } else {
                        quotes[quote.symbol] = quote;
                        log(`📊 ${quote.symbol}: $${quote.mid_price?.toFixed(2)}`, 'success');
                    }
                });
                
                renderQuotes();
            } catch (error) {
                log(`❌ Fetch error: ${error.message}`, 'error');
            }
        }

        function renderQuotes() {
            const quotesDiv = document.getElementById('quotes');
            
            if (Object.keys(quotes).length === 0) {
                quotesDiv.innerHTML = '<p style="color: #888; padding: 40px; text-align: center;">No quotes yet. Connect and subscribe to symbols above.</p>';
                return;
            }

            let html = '';
            for (const [symbol, quote] of Object.entries(quotes)) {
                const changeClass = quote.daily_pnl >= 0 ? 'positive' : 'negative';
                const changeSymbol = quote.daily_pnl >= 0 ? '▲' : '▼';
                
                html += `
                    <div class="quote-card ${changeClass}">
                        <div class="quote-symbol">${symbol}</div>
                        <div class="quote-price">$${quote.mid_price?.toFixed(2) || 'N/A'}</div>
                        <div class="quote-change ${changeClass}">
                            ${changeSymbol} $${Math.abs(quote.daily_pnl || 0).toFixed(2)} 
                            (${quote.daily_pnl_percentage?.toFixed(2) || '0.00'}%)
                        </div>
                        <div class="quote-meta">
                            <strong>Bid:</strong> $${quote.bid_price?.toFixed(2) || 'N/A'} | 
                            <strong>Ask:</strong> $${quote.ask_price?.toFixed(2) || 'N/A'}<br>
                            <strong>Spread:</strong> $${quote.spread?.toFixed(2) || 'N/A'}<br>
                            <strong>Prev Close:</strong> $${quote.previous_close?.toFixed(2) || 'N/A'}
                        </div>
                    </div>
                `;
            }
            
            quotesDiv.innerHTML = html;
        }

        // Initial setup
        log('🚀 Market Data Service Test Client loaded', 'info');
        log('📍 Server URL: ' + SERVER_URL, 'info');
        log('💡 Click "Connect" to establish WebSocket connection', 'info');
    </script>
</body>
</html>
